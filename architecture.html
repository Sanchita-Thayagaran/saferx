<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SafeRx — System Architecture</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0A0F1E;
      font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
      color: #F9FAFB;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 28px 24px;
    }

    .page { width: 1200px; max-width: 100%; }

    /* ── Title ── */
    .title {
      text-align: center;
      margin-bottom: 22px;
    }
    .title h1 {
      font-size: 26px;
      font-weight: 800;
      letter-spacing: -0.4px;
      color: #F9FAFB;
    }
    .title h1 .blue { color: #3B82F6; }
    .title p {
      font-size: 12px;
      color: #4B5563;
      margin-top: 6px;
      letter-spacing: 0.5px;
    }

    /* ── Diagram wrapper ── */
    .diagram {
      background: #0D1424;
      border: 1px solid #1F2937;
      border-radius: 16px;
      padding: 20px 24px 16px;
      margin-bottom: 16px;
    }

    /* ── Animated arrows ── */
    @keyframes flow {
      from { stroke-dashoffset: 12; }
      to   { stroke-dashoffset: 0;  }
    }
    .fa  { stroke-dasharray: 7 4; animation: flow 1.1s linear infinite; }
    .fas { stroke-dasharray: 6 4; animation: flow 1.7s linear infinite; }

    /* ── Tech badges ── */
    .badges {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
      justify-content: center;
    }
    .badge {
      padding: 4px 11px;
      border-radius: 20px;
      font-size: 10.5px;
      font-weight: 600;
      letter-spacing: 0.2px;
      background: #111827;
      border: 1px solid #1F2937;
      color: #6B7280;
    }
    .badge.b { border-color: #3B82F680; color: #3B82F6; }
    .badge.g { border-color: #10B98180; color: #10B981; }
  </style>
</head>
<body>
<div class="page">

  <div class="title">
    <h1>Safe<span class="blue">Rx</span> &mdash; System Architecture</h1>
    <p>Microsoft Agents League Hackathon 2026 &nbsp;·&nbsp; Creative Apps Track</p>
